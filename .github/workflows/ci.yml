name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jp
          POSTGRES_PASSWORD: jp
          POSTGRES_DB: jp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jp:jp@localhost:5432/jp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Apply database migrations
        run: pnpm --filter @jp/backend db:migrate
      - run: pnpm test

  e2e-local:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jp
          POSTGRES_PASSWORD: jp
          POSTGRES_DB: jp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgres://jp:jp@localhost:5432/jp
      E2E_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Check E2E credentials
        id: e2e
        run: |
          if [ -z "${{ secrets.E2E_EMAIL }}" ] || [ -z "${{ secrets.E2E_PASSWORD }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping local E2E: E2E_EMAIL or E2E_PASSWORD is not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm install --frozen-lockfile
        if: steps.e2e.outputs.skip != 'true'
      - name: Apply database migrations
        if: steps.e2e.outputs.skip != 'true'
        run: pnpm --filter @jp/backend db:migrate
      - name: Install Playwright browsers
        if: steps.e2e.outputs.skip != 'true'
        run: pnpm --filter @jp/tests exec playwright install chromium --with-deps
      - name: Run local E2E
        if: steps.e2e.outputs.skip != 'true'
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: pnpm test:e2e

  e2e-production:
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: https://main.dbkqz2plarhlv.amplifyapp.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Check E2E credentials
        id: e2e
        run: |
          if [ -z "${{ secrets.E2E_EMAIL }}" ] || [ -z "${{ secrets.E2E_PASSWORD }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping production E2E: E2E_EMAIL or E2E_PASSWORD is not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - run: pnpm install --frozen-lockfile
        if: steps.e2e.outputs.skip != 'true'
      - name: Install Playwright browsers
        if: steps.e2e.outputs.skip != 'true'
        run: pnpm --filter @jp/tests exec playwright install chromium --with-deps
      - name: Run production E2E
        if: steps.e2e.outputs.skip != 'true'
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: pnpm test:e2e

  deploy-backend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CDK app
        run: |
          pnpm --filter @jp/shared-types build
          pnpm --filter @jp/backend build
          pnpm --filter @jp/infra build
      - name: CDK deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Skipping CDK deploy: AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is not configured."
            exit 0
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "Skipping CDK deploy: AWS_REGION is not configured."
            exit 0
          fi
          pnpm --filter @jp/infra exec cdk deploy --require-approval never
