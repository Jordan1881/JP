name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: jp
          POSTGRES_PASSWORD: jp
          POSTGRES_DB: jp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://jp:jp@localhost:5432/jp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Apply database migrations
        run: pnpm --filter @jp/backend db:migrate
      - run: pnpm test

  deploy-backend:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build CDK app
        run: |
          pnpm --filter @jp/shared-types build
          pnpm --filter @jp/backend build
          pnpm --filter @jp/infra build
      - name: CDK deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "Skipping CDK deploy: AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is not configured."
            exit 0
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "Skipping CDK deploy: AWS_REGION is not configured."
            exit 0
          fi
          pnpm --filter @jp/infra exec cdk deploy --require-approval never
