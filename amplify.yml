version: 1
applications:
  - appRoot: Frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@10.4.1 --activate
            - pnpm install --frozen-lockfile
            - pnpm rebuild esbuild sharp
            - pnpm --filter @jp/shared-types build
            - pnpm --filter @jp/backend build
        build:
          commands:
            - pnpm --filter @jp/frontend build
      artifacts:
        baseDirectory: Frontend/.next
        files:
          - "**/*"
      cache:
        paths:
          - Frontend/.next/cache/**/*
          - node_modules/**/*
